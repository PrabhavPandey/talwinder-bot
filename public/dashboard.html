<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Talwinder | Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #ffffff;
    }

    .border-subtle {
      border-color: #f1f1f1;
    }

    .bg-subtle {
      background-color: #fafafa;
    }

    select,
    input {
      outline: none;
      transition: all 0.2s;
    }

    select:focus,
    input:focus {
      border-color: #000;
    }

    .table-row:hover {
      background-color: #fafafa;
    }
  </style>
</head>

<body class="flex min-h-screen text-black">

  <!-- Minimal Sidebar -->
  <aside class="w-64 border-r border-subtle flex flex-col h-screen sticky top-0">
    <div class="p-6">
      <div class="flex items-center gap-2 mb-8">
        <div class="w-2 h-6 bg-black rounded-full"></div>
        <span class="font-bold text-lg tracking-tight">talwinder</span>
      </div>

      <nav class="space-y-1">
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm font-medium bg-subtle rounded-md">
          <i data-lucide="lightbulb" class="w-4 h-4"></i>
          ideas
        </a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm font-medium text-gray-500 hover:text-black">
          <i data-lucide="settings" class="w-4 h-4"></i>
          settings
        </a>
      </nav>
    </div>

    <div class="mt-auto p-6 border-t border-subtle">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-[10px] font-bold">AD</div>
        <div class="flex-1 min-w-0">
          <p class="text-xs font-semibold">admin</p>
          <p class="text-[10px] text-gray-400">grapevine org</p>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 p-10 max-w-6xl mx-auto">
    <header class="mb-12">
      <h1 class="text-3xl font-bold tracking-tight mb-2">idea repository</h1>
      <p class="text-gray-500 text-sm">monitor and sponsor employee suggestions for grapevine.</p>
    </header>

    <!-- Metrics Section -->
    <div class="grid grid-cols-3 gap-8 mb-12" id="statsGrid">
      <div class="border border-subtle p-6 rounded-xl">
        <div class="text-gray-400 text-xs font-bold uppercase tracking-widest mb-4">total submissions</div>
        <div class="text-4xl font-bold" id="totalIdeas">-</div>
      </div>
      <div class="border border-subtle p-6 rounded-xl">
        <div class="text-gray-400 text-xs font-bold uppercase tracking-widest mb-4">sponsored ideas</div>
        <div class="text-4xl font-bold" id="sponsoredIdeas">-</div>
      </div>
      <div class="border border-subtle p-6 rounded-xl">
        <div class="text-gray-400 text-xs font-bold uppercase tracking-widest mb-4">avg novelty</div>
        <div class="text-4xl font-bold" id="avgNovelty">-</div>
      </div>
    </div>

    <!-- Filters -->
    <section class="mb-10 flex gap-4">
      <div class="flex-1 relative">
        <i data-lucide="search" class="absolute left-3 top-2.5 w-4 h-4 text-gray-400"></i>
        <input type="text" id="userSearch" class="w-full border border-subtle pl-10 pr-4 py-2 rounded-lg text-sm"
          placeholder="search by name or phone..." oninput="fetchIdeas()">
      </div>
      <select id="categoryFilter" class="border border-subtle px-4 py-2 rounded-lg text-sm bg-white"
        onchange="fetchIdeas()">
        <option value="">all categories</option>
        <option value="growth">growth</option>
        <option value="engineering">engineering</option>
        <option value="product">product</option>
        <option value="org">organization</option>
      </select>
      <select id="statusFilter" class="border border-subtle px-4 py-2 rounded-lg text-sm bg-white"
        onchange="fetchIdeas()">
        <option value="">all statuses</option>
        <option value="sponsored">sponsored</option>
        <option value="evaluating">evaluating</option>
        <option value="pending">pending</option>
        <option value="rejected">rejected</option>
      </select>
    </section>

    <!-- Data Table -->
    <section class="border border-subtle rounded-xl overflow-hidden">
      <table class="w-full text-left text-sm">
        <thead class="bg-subtle text-gray-400 font-medium border-b border-subtle">
          <tr>
            <th class="px-6 py-4 font-bold uppercase text-[10px] tracking-widest">contributor</th>
            <th class="px-6 py-4 font-bold uppercase text-[10px] tracking-widest">idea</th>
            <th class="px-6 py-4 font-bold uppercase text-[10px] tracking-widest">scores</th>
            <th class="px-6 py-4 font-bold uppercase text-[10px] tracking-widest">status</th>
            <th class="px-6 py-4 font-bold uppercase text-[10px] tracking-widest">ship date</th>
          </tr>
        </thead>
        <tbody id="ideasGrid">
          <!-- Ideas injected here -->
        </tbody>
      </table>
      <div id="noIdeasPlaceholder" class="hidden py-20 text-center text-gray-400 text-sm">
        no ideas found matching these filters.
      </div>
    </section>
  </main>

  <script>
    async function fetchStats() {
      try {
        const res = await fetch('/api/dashboard/stats');
        const data = await res.json();
        if (data.success) {
          document.getElementById('totalIdeas').textContent = data.stats.total;
          document.getElementById('sponsoredIdeas').textContent = data.stats.sponsored;
          document.getElementById('avgNovelty').textContent = `${data.stats.novelty}/5`;
        }
      } catch (err) { console.error('Stats fetch error:', err); }
    }

    async function fetchIdeas() {
      const status = document.getElementById('statusFilter').value;
      const category = document.getElementById('categoryFilter').value;
      const user = document.getElementById('userSearch').value;

      let url = `/api/dashboard/ideas?status=${status}&category=${category}&user=${user}`;

      try {
        const res = await fetch(url);
        const data = await res.json();
        if (data.success) {
          renderIdeas(data.ideas);
          const placeholder = document.getElementById('noIdeasPlaceholder');
          ideas.length === 0 ? placeholder.classList.remove('hidden') : placeholder.classList.add('hidden');
        }
      } catch (err) { console.error('Ideas fetch error:', err); }
    }

    function renderIdeas(ideas) {
      const grid = document.getElementById('ideasGrid');
      grid.innerHTML = '';

      ideas.forEach(idea => {
        const row = document.createElement('tr');
        row.className = 'border-b border-subtle table-row';

        row.innerHTML = `
          <td class="px-6 py-6">
            <p class="font-bold text-black">${idea.user.name}</p>
            <p class="text-[10px] text-gray-400">${idea.user.phoneNumber}</p>
          </td>
          <td class="px-6 py-6 max-w-sm">
            <p class="text-xs text-gray-600 line-clamp-2">${idea.description}</p>
            <span class="inline-block mt-2 text-[9px] font-bold uppercase tracking-wider text-gray-400 border border-subtle px-1.5 py-0.5 rounded">
              ${idea.category}
            </span>
          </td>
          <td class="px-6 py-6">
            <div class="space-y-1">
              <div class="flex items-center gap-2">
                <span class="text-[9px] text-gray-400 uppercase font-bold w-12">novelty</span>
                <span class="text-black font-bold text-xs">${idea.noveltyScore || 0}/5</span>
              </div>
              <div class="flex items-center gap-2">
                <span class="text-[9px] text-gray-400 uppercase font-bold w-12">utility</span>
                <span class="text-black font-bold text-xs">${idea.utilityScore || 0}/5</span>
              </div>
            </div>
          </td>
          <td class="px-6 py-6 text-[10px] font-bold uppercase tracking-widest">
            ${idea.status}
          </td>
          <td class="px-6 py-6 text-[10px] font-medium text-gray-400">
            ${idea.targetExecutionDate || 'tbd'}
          </td>
        `;

        grid.appendChild(row);
      });
      lucide.createIcons();
    }

    // Initial load
    fetchStats();
    fetchIdeas();
    lucide.createIcons();
  </script>
</body>

</html>
